name: Bolao digest

# Heartbeat diario + lista dos jogos do dia no Telegram (09:00 BRT = 12:00 UTC).
# Se o digest nao chegar de manha, o robo esta morto - voce descobre cedo, nao a T-40.
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m bolao.auto_palpite --digest
